<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aily Runtime Log Exporter</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --accent: #0f766e;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 800px;
      margin: 48px auto;
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Aily Runtime Log Exporter</h1>
    <p>Chrome extension support page for Aily Runtime Log Exporter.</p>
    <p><a href="./privacy-policy.html">Privacy Policy / 隐私权政策</a></p>
    <p><a href="https://github.com/Fortytwoo/aily-log-export">GitHub Repository</a></p>
  </main>
</body>
</html>
